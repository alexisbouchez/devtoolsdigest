<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevTools Digest</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/iosevka@5/index.min.css">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <nav>
      <a href="/" class="logo">DevTools Digest</a>
      <div class="nav-links">
        <a href="/">Articles</a>
        <a href="/digests">Digests</a>
      </div>
    </nav>
  </header>
  <main>
    {{if eq .Page "index"}}
      {{template "index.html" .}}
    {{else if eq .Page "digest"}}
      {{template "digest.html" .}}
    {{else if eq .Page "digests"}}
      {{template "digests.html" .}}
    {{end}}
  </main>
</body>
</html>
