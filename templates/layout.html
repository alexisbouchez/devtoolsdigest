<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevTools Digest</title>
  <link rel="stylesheet" href="/static/style.css">
  <script>
    (function() {
      var t = localStorage.getItem('theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <header>
    <nav>
      <a href="/" class="logo">DevTools Digest</a>
      <div class="nav-links">
        <a href="/">Articles</a>
        <a href="/digests">Digests</a>
        <button class="theme-toggle" onclick="toggleTheme()">light/dark</button>
      </div>
    </nav>
  </header>
  <script>
    function toggleTheme() {
      var html = document.documentElement;
      var current = html.getAttribute('data-theme');
      var next = current === 'light' ? 'dark' : 'light';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    }
  </script>
  <main>
    {{if eq .Page "index"}}
      {{template "index.html" .}}
    {{else if eq .Page "digest"}}
      {{template "digest.html" .}}
    {{else if eq .Page "digests"}}
      {{template "digests.html" .}}
    {{end}}
  </main>
</body>
</html>
